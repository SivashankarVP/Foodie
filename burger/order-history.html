<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Order History - Foodie</title>
    <style>
        .history-wrapper {
            padding: 120px 8%;
            color: #fff;
            max-width: 1000px;
            margin: 0 auto;
        }
        .history-title {
            font-size: 36px;
            font-family: 'Product Sans B';
            margin-bottom: 30px;
        }
        .filter-search-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
        }
        .filter-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        .order-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .order-card:hover {
            border-color: #ff9800;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .restaurant-name {
            font-size: 20px;
            font-family: 'Product Sans B';
        }
        .order-status {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        .order-items-list {
            margin-bottom: 15px;
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
        }
        .order-meta-info {
            display: flex;
            gap: 30px;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .action-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .primary-action {
            background: #ff9800;
            color: #fff;
        }
        .primary-action:hover {
            background: #ff7b00;
        }
        .secondary-action {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .secondary-action:hover {
            background: rgba(255,255,255,0.2);
        }
        .empty-history {
            text-align: center;
            padding: 50px 0;
            color: #aaa;
        }
        .empty-history i {
            font-size: 60px;
            color: #ff9800;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body style="background:#000;">

<div id="main">

    <!-- ================= NAVBAR ================= -->
    <nav style="background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);">
        <a href="index.html" class="logo">🍔 Foodie</a>
        <div class="cntr-nav">
            <a href="index.html#home">Home</a>
            <a href="index.html#restaurants">Restaurants</a>
            <a href="order-history.html">Orders</a>
        </div>
        <div class="nav-right">
            <i class="ri-search-line" id="search-icon" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <i class="ri-user-line" id="profile-icon" onclick="window.location.href='profile.html'" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <div id="cart-icon-container" style="position:relative; cursor:pointer;" onclick="window.location.href='cart.html'">
                <i class="ri-shopping-cart-2-line" id="cart-icon" style="color:#fff; font-size:24px; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ff9800; color:#fff; font-size:12px; font-weight:bold; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
            </div>
            <a href="login.html" class="sign-btn">Sign In</a>
            <i class="ri-menu-fill" id="menu"></i>
        </div>
    </nav>

    <div class="history-wrapper">
        <div class="history-title">Your Order History</div>

        <div class="filter-search-bar">
            <input type="text" id="search-orders" class="search-input" placeholder="Search orders by item or restaurant..." oninput="filterOrders()">
            <select id="filter-status" class="filter-select" onchange="filterOrders()">
                <option value="all">All Orders</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>

        <div id="orders-list-container">
            <!-- Dynamic Order History Cards -->
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    // Initial mock orders to fill in case the user has none yet
    const defaultOrders = [
        {
            orderNumber: 'FD801243',
            date: '10 Jul 2026',
            restaurant: "Burger King",
            items: [{ name: "Cheese Burger", quantity: 2, price: 150 }],
            price: 340,
            paymentMethod: "UPI",
            status: "Delivered",
            address: "Flat 405, Premium Residency, Cyber Hills, Hyderabad"
        },
        {
            orderNumber: 'FD789421',
            date: '05 Jul 2026',
            restaurant: "KFC",
            items: [{ name: "Crispy Chicken Wings", quantity: 1, price: 220 }],
            price: 299,
            paymentMethod: "Credit Card",
            status: "Cancelled",
            address: "Flat 405, Premium Residency, Cyber Hills, Hyderabad"
        }
    ];

    let orderHistory = JSON.parse(localStorage.getItem('order_history'));
    if (!orderHistory || orderHistory.length === 0) {
        orderHistory = defaultOrders;
        localStorage.setItem('order_history', JSON.stringify(orderHistory));
    }

    function renderOrders(ordersToRender) {
        const container = document.getElementById('orders-list-container');
        container.innerHTML = '';

        if (ordersToRender.length === 0) {
            container.innerHTML = `
                <div class="empty-history">
                    <i class="ri-history-line"></i>
                    <p>No orders found.</p>
                </div>
            `;
            return;
        }

        ordersToRender.forEach((order, idx) => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.setAttribute('data-index', idx);

            const itemsText = order.items.map(item => `${item.name} (x${item.quantity})`).join(', ');

            card.innerHTML = `
                <div class="order-card-header">
                    <div>
                        <div class="restaurant-name">${order.restaurant}</div>
                        <div style="font-size:12px; color:#888; margin-top:4px;">ID: ${order.orderNumber}</div>
                    </div>
                    <span class="order-status" style="
                        background: ${order.status === 'Cancelled' ? 'rgba(244, 67, 54, 0.15)' : 'rgba(76, 175, 80, 0.15)'};
                        color: ${order.status === 'Cancelled' ? '#f44336' : '#4caf50'};
                    ">${order.status}</span>
                </div>
                <div class="order-items-list">
                    <strong>Items:</strong> ${itemsText}
                </div>
                <div class="order-meta-info">
                    <span><i class="ri-calendar-line"></i> ${order.date}</span>
                    <span><i class="ri-wallet-3-line"></i> ${order.paymentMethod}</span>
                    <span><i class="ri-map-pin-line"></i> ${order.address}</span>
                    <span style="color:#ff9800; font-weight:bold;">Total: ₹${order.price}</span>
                </div>
                <div class="action-row">
                    <button class="action-btn primary-action" onclick="reorder(${idx})"><i class="ri-refresh-line"></i> Reorder</button>
                    <button class="action-btn secondary-action" onclick="downloadInvoice('${order.orderNumber}')"><i class="ri-download-line"></i> Invoice</button>
                    <button class="action-btn secondary-action" onclick="rateOrder()"><i class="ri-star-line"></i> Rate Order</button>
                </div>
            `;
            container.appendChild(card);
        });

        // GSAP transition for cards
        gsap.from(".order-card", {
            y: 40,
            opacity: 0,
            duration: 0.5,
            stagger: 0.1
        });
    }

    function filterOrders() {
        const query = document.getElementById('search-orders').value.toLowerCase();
        const status = document.getElementById('filter-status').value;

        const filtered = orderHistory.filter(order => {
            const matchesQuery = order.restaurant.toLowerCase().includes(query) || 
                                 order.items.some(i => i.name.toLowerCase().includes(query));
            const matchesStatus = status === 'all' || order.status === status;
            return matchesQuery && matchesStatus;
        });

        renderOrders(filtered);
    }

    function reorder(idx) {
        const order = orderHistory[idx];
        localStorage.setItem('cart', JSON.stringify(order.items));
        alert("Items added back to your cart!");
        window.location.href = 'cart.html';
    }

    function downloadInvoice(orderId) {
        alert(`Downloading invoice for Order ${orderId}...`);
    }

    function rateOrder() {
        const rating = prompt("Rate your order out of 5 stars:");
        if (rating) {
            alert(`Thank you for giving us a ${rating}-star rating!`);
        }
    }

    renderOrders(orderHistory);
</script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-init.js"></script>
</body>
</html>
