<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Shopping Cart - Foodie</title>
    <style>
        .cart-wrapper {
            padding: 120px 8%;
            color: #fff;
            max-width: 1200px;
            margin: 0 auto;
        }
        .cart-title {
            font-size: 36px;
            font-family: 'Product Sans B';
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        .cart-items-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .cart-item-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            transition: 0.3s;
        }
        .cart-item-card:hover {
            border-color: #ff9800;
        }
        .cart-item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-details h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .cart-item-details p {
            color: #aaa;
            font-size: 14px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .qty-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }
        .qty-btn:hover {
            color: #ff9800;
        }
        .cart-item-price {
            font-size: 20px;
            font-weight: bold;
            color: #ff9800;
            width: 100px;
            text-align: right;
        }
        .remove-item-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }
        .remove-item-btn:hover {
            transform: scale(1.1);
        }
        .summary-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            color: #ccc;
        }
        .summary-row.total {
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }
        .coupon-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .coupon-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .coupon-btn {
            background: #ff9800;
            border: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .coupon-btn:hover {
            background: #ff7b00;
        }
        .checkout-btn {
            width: 100%;
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .checkout-btn:hover {
            background: #ff7b00;
        }
        .empty-cart {
            text-align: center;
            padding: 50px 0;
            display: none;
        }
        .empty-cart i {
            font-size: 80px;
            color: #ff9800;
            margin-bottom: 20px;
            display: block;
        }
        .empty-cart p {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 20px;
        }
        .empty-cart button {
            background: #ff9800;
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        @media(max-width: 992px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body style="background:#000;">

<div id="main">

    <!-- ================= NAVBAR ================= -->
    <nav style="background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);">
        <a href="index.html" class="logo">🍔 Foodie</a>
        <div class="cntr-nav">
            <a href="index.html#home">Home</a>
            <a href="index.html#restaurants">Restaurants</a>
            <a href="order-history.html">Orders</a>
        </div>
        <div class="nav-right">
            <i class="ri-search-line" id="search-icon" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <i class="ri-user-line" id="profile-icon" onclick="window.location.href='profile.html'" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <div id="cart-icon-container" style="position:relative; cursor:pointer;" onclick="window.location.href='cart.html'">
                <i class="ri-shopping-cart-2-line" id="cart-icon" style="color:#ff9800; font-size:24px; transition:.3s;"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ff9800; color:#fff; font-size:12px; font-weight:bold; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
            </div>
            <a href="login.html" class="sign-btn">Sign In</a>
            <i class="ri-menu-fill" id="menu"></i>
        </div>
    </nav>

    <div class="cart-wrapper">
        <div class="cart-title">
            <i class="ri-shopping-bag-line"></i> Your Shopping Bag
        </div>

        <div class="empty-cart" id="empty-cart">
            <i class="ri-shopping-cart-2-line"></i>
            <p>Your cart is empty!</p>
            <button onclick="window.location.href='restaurant-menu.html'">Explore Menu</button>
        </div>

        <div class="cart-container" id="cart-container">
            <div class="cart-items-section" id="cart-items">
                <!-- Cart Items dynamically added here -->
            </div>

            <!-- Order Summary Section -->
            <div class="summary-section">
                <h3 style="margin-bottom:20px; font-family:'Product Sans B';">Price Summary</h3>
                <div class="coupon-box" style="margin-bottom: 10px;">
                    <input type="text" id="coupon-input" class="coupon-input" placeholder="Enter coupon code">
                    <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
                </div>
                <!-- Available Coupons Listing -->
                <div class="available-coupons" style="margin-bottom: 25px; padding: 10px; background: rgba(255,152,0,0.1); border: 1px dashed #ff9800; border-radius: 10px;">
                    <span style="font-size: 13px; color: #ff9800; font-weight: bold; display: block; margin-bottom: 5px;">🔥 Available Offers:</span>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px;">
                            <span><strong>SIVA95</strong> (Get 95% Off Subtotal)</span>
                            <span style="cursor: pointer; color: #ff9800; text-decoration: underline;" onclick="selectCouponCode('SIVA95')">Apply</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px;">
                            <span><strong>WELCOME50</strong> (Get ₹100 Off)</span>
                            <span style="cursor: pointer; color: #ff9800; text-decoration: underline;" onclick="selectCouponCode('WELCOME50')">Apply</span>
                        </div>
                    </div>
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>GST (18%)</span>
                    <span id="gst">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Partner Fee</span>
                    <span id="delivery">₹40</span>
                </div>
                <div class="summary-row" id="discount-row" style="display:none; color: #4caf50;">
                    <span>Coupon Discount</span>
                    <span id="discount">-₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Grand Total</span>
                    <span id="grand-total">₹0</span>
                </div>
                <button class="checkout-btn" onclick="window.location.href='checkout.html'">
                    Proceed to Checkout <i class="ri-arrow-right-line"></i>
                </button>
            </div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    let discountAmount = parseInt(localStorage.getItem('discountAmount')) || 0;

    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const cartItemsContainer = document.getElementById('cart-items');
        const emptyCartContainer = document.getElementById('empty-cart');
        const cartContainer = document.getElementById('cart-container');

        if (cart.length === 0) {
            emptyCartContainer.style.display = 'block';
            cartContainer.style.display = 'none';
            return;
        }

        emptyCartContainer.style.display = 'none';
        cartContainer.style.display = 'grid';
        cartItemsContainer.innerHTML = '';

        let subtotal = 0;

        cart.forEach(item => {
            subtotal += item.price * item.quantity;
            const card = document.createElement('div');
            card.className = 'cart-item-card';
            card.innerHTML = `
                <img src="${item.img}" class="cart-item-img" alt="${item.name}">
                <div class="cart-item-details">
                    <h3>${item.name}</h3>
                    <p>₹${item.price} each</p>
                </div>
                <div class="quantity-control">
                    <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                    <span class="item-qty">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                </div>
                <div class="cart-item-price">₹${item.price * item.quantity}</div>
                <button class="remove-item-btn" onclick="removeItem(${item.id})">
                    <i class="ri-delete-bin-line"></i>
                </button>
            `;
            cartItemsContainer.appendChild(card);
        });

        // Animations for item list
        gsap.from(".cart-item-card", {
            x: -30,
            opacity: 0,
            duration: 0.4,
            stagger: 0.08
        });

        calculatePrices(subtotal);
    }

    function calculatePrices(subtotal) {
        const gst = Math.round(subtotal * 0.18);
        const delivery = subtotal > 0 ? 40 : 0;
        
        const savedCoupon = localStorage.getItem('couponCode');
        if (savedCoupon === 'SIVA' || savedCoupon === 'SIVA95') {
            discountAmount = Math.round(subtotal * 0.95);
            localStorage.setItem('discountAmount', discountAmount);
        } else if (savedCoupon === 'WELCOME50') {
            discountAmount = 100;
            localStorage.setItem('discountAmount', discountAmount);
        }

        const total = subtotal + gst + delivery - discountAmount;

        document.getElementById('subtotal').innerText = `₹${subtotal}`;
        document.getElementById('gst').innerText = `₹${gst}`;
        document.getElementById('delivery').innerText = `₹${delivery}`;
        document.getElementById('grand-total').innerText = `₹${Math.max(0, total)}`;

        const discountRow = document.getElementById('discount-row');
        if (discountAmount > 0) {
            discountRow.style.display = 'flex';
            document.getElementById('discount').innerText = `-₹${discountAmount}`;
            if (savedCoupon) {
                document.getElementById('coupon-input').value = savedCoupon;
            }
        } else {
            discountRow.style.display = 'none';
        }
    }

    function updateQty(id, change) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            // Reset discount if cart becomes empty
            if (cart.length === 0) {
                localStorage.removeItem('discountAmount');
                localStorage.removeItem('couponCode');
                discountAmount = 0;
            }
            renderCart();
            updateGlobalCartCount();
        }
    }

    function removeItem(id) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart = cart.filter(i => i.id !== id);
        localStorage.setItem('cart', JSON.stringify(cart));
        if (cart.length === 0) {
            localStorage.removeItem('discountAmount');
            localStorage.removeItem('couponCode');
            discountAmount = 0;
        }
        renderCart();
        updateGlobalCartCount();
    }

    function selectCouponCode(code) {
        document.getElementById('coupon-input').value = code;
        applyCoupon();
    }

    function applyCoupon() {
        const input = document.getElementById('coupon-input').value.trim().toUpperCase();
        const discountRow = document.getElementById('discount-row');
        const discountEl = document.getElementById('discount');
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        let subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);

        if (input === 'WELCOME50') {
            discountAmount = 100;
            localStorage.setItem('discountAmount', discountAmount);
            localStorage.setItem('couponCode', input);
            discountRow.style.display = 'flex';
            discountEl.innerText = `-₹${discountAmount}`;
            alert("Promo Code applied successfully! You got ₹100 off.");
            renderCart();
        } else if (input === 'SIVA' || input === 'SIVA95') {
            discountAmount = Math.round(subtotal * 0.95);
            localStorage.setItem('discountAmount', discountAmount);
            localStorage.setItem('couponCode', 'SIVA95');
            discountRow.style.display = 'flex';
            discountEl.innerText = `-₹${discountAmount}`;
            alert("Promo Code SIVA95 applied successfully! You got 95% off!");
            renderCart();
        } else {
            alert("Invalid Promo Code!");
        }
    }

    renderCart();
</script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-init.js"></script>
</body>
</html>
