<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Popular Restaurants - Foodie. Discover top-rated local restaurants and popular food brands partnering with Foodie for fast online delivery.">
    <meta name="keywords" content="popular restaurants, foodie restaurants, find restaurants, food delivery partners, Sivashankar V P">
    <meta name="author" content="Sivashankar V P">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sivashankar-vp.github.io/Foodie/restaurant.html">
    <meta property="og:title" content="Popular Restaurants - Foodie">
    <meta property="og:description" content="Discover top-rated local restaurants and popular food brands partnering with Foodie for fast online delivery.">
    <meta property="og:image" content="Assets/burger.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://sivashankar-vp.github.io/Foodie/restaurant.html">
    <meta property="twitter:title" content="Popular Restaurants - Foodie">
    <meta property="twitter:description" content="Discover top-rated local restaurants and popular food brands partnering with Foodie for fast online delivery.">
    <meta property="twitter:image" content="Assets/burger.png">

    <title>Popular Restaurants - Foodie</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @media(max-width: 992px) {
            .restaurant-details-card {
                margin: -50px 20px 30px 20px !important;
                padding: 30px 20px !important;
            }
        }
        @media(max-width: 600px) {
            #restaurant-name-heading {
                font-size: 30px !important;
            }
            .meta-info {
                gap: 15px !important;
            }
            .meta-item {
                padding: 8px 15px !important;
                font-size: 13px !important;
            }
            .coupons-container {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }
        }
    </style>
</head>
<body style="background:#000;">

<div id="main">

    <!-- ================= NAVBAR ================= -->
    <nav style="background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);">
        <a href="index.html" class="logo">🍔 Foodie</a>
        <div class="cntr-nav">
            <a href="index.html#home">Home</a>
            <a href="index.html#restaurants">Restaurants</a>
            <a href="order-history.html">Orders</a>
        </div>
        <div class="nav-right">
            <i class="ri-search-line" id="search-icon" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <i class="ri-user-line" id="profile-icon" onclick="window.location.href='profile.html'" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <div id="cart-icon-container" style="position:relative; cursor:pointer;" onclick="window.location.href='cart.html'">
                <i class="ri-shopping-cart-2-line" id="cart-icon" style="color:#fff; font-size:24px; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ff9800; color:#fff; font-size:12px; font-weight:bold; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
            </div>
            <a href="login.html" class="sign-btn">Sign In</a>
            <i class="ri-menu-fill" id="menu"></i>
        </div>
    </nav>

    <!-- ================= RESTAURANT HERO ================= -->
    <section class="restaurant-hero" style="margin-top: 80px; position: relative;">
        <div class="cover-image" style="width: 100%; height: 40vh; background: url('https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=2065&auto=format&fit=crop') no-repeat center center/cover;"></div>
        
        <div class="restaurant-details-card glass-card" style="position: relative; max-width: 900px; margin: -100px auto 50px auto; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 40px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; text-align: center; color: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
            <div id="logo-container" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff9800; background: #111; margin-top: -80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(255,152,0,0.3); overflow: hidden;">
                <i class="ri-restaurant-2-line" style="font-size: 60px; color: #ff9800;"></i>
            </div>
            
            <h1 id="restaurant-name-heading" style="font-size: 42px; margin-top: 20px; font-family: 'Product Sans B';">Foodie Partner</h1>
            <p id="restaurant-cuisine" style="color: #bfbfbf; font-size: 18px; margin-top: 10px;">Fast Food, Delicious Meals, Beverages</p>
            
            <div class="meta-info" style="display: flex; gap: 30px; margin-top: 25px; flex-wrap: wrap; justify-content: center;">
                <div class="meta-item" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 30px;">
                    <i class="ri-star-fill" style="color: #ff9800; font-size: 20px;"></i>
                    <span style="font-weight: bold;">4.9 (15k+ Ratings)</span>
                </div>
                <div class="meta-item" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 30px;">
                    <i class="ri-time-line" style="color: #ff9800; font-size: 20px;"></i>
                    <span style="font-weight: bold;">20-30 mins</span>
                </div>
                <div class="meta-item" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 30px;">
                    <i class="ri-map-pin-line" style="color: #ff9800; font-size: 20px;"></i>
                    <span style="font-weight: bold;">1.2 km Away</span>
                </div>
                <div class="meta-item" style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 30px;">
                    <i class="ri-door-open-line" style="color: #ff9800; font-size: 20px;"></i>
                    <span style="font-weight: bold;">11 AM - 12 PM</span>
                </div>
            </div>

            <!-- Double Coupon Display -->
            <div class="coupons-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 30px;">
                <div class="offer-banner" style="background: linear-gradient(90deg, #ff9800, #ff5722); padding: 15px 20px; border-radius: 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(255, 152, 0, 0.2);">
                    <i class="ri-percent-line" style="font-size: 22px; background: rgba(255,255,255,0.2); padding: 6px; border-radius: 50%;"></i>
                    <div style="text-align: left;">
                        <h3 style="font-size: 16px; margin:0; font-family:'Product Sans B';">95% OFF Subtotal</h3>
                        <p style="font-size: 13px; margin:0; opacity: 0.9;">Code: SIVA95</p>
                    </div>
                </div>
                <div class="offer-banner" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; border-radius: 15px; display: flex; align-items: center; gap: 10px;">
                    <i class="ri-gift-line" style="font-size: 22px; color: #ff9800; background: rgba(255,152,0,0.1); padding: 6px; border-radius: 50%;"></i>
                    <div style="text-align: left;">
                        <h3 style="font-size: 16px; margin:0; font-family:'Product Sans B';">Flat ₹100 Discount</h3>
                        <p style="font-size: 13px; margin:0; opacity: 0.9; color: #ccc;">Code: WELCOME50</p>
                    </div>
                </div>
            </div>

            <button onclick="window.location.href='restaurant-menu.html'" class="menu-btn" style="margin-top: 30px; padding: 15px 40px; border-radius: 50px; background: #ff9800; border: none; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4);">
                View Full Menu <i class="ri-arrow-right-line" style="vertical-align: middle;"></i>
            </button>
        </div>
    </section>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-init.js"></script>
<script>
    // Load Query Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('name') || 'Foodie Partner';
    const logoSrc = urlParams.get('logo');

    document.getElementById('restaurant-name-heading').innerText = name;
    document.title = `${name} - Foodie`;

    // Map cuisine tags dynamically
    const cuisines = {
        "McDonald's": "Burgers, Fast Food, Beverages",
        "Burger King": "Burgers, Fast Food, Sides",
        "KFC": "Fried Chicken, Burgers, Sides",
        "Wendy's": "Burgers, Fast Food, Shakes",
        "Pizza Hut": "Pizzas, Pasta, Desserts",
        "Domino's": "Pizzas, Garlic Bread, Drinks",
        "Subway": "Sandwiches, Salads, Cookies",
        "Starbucks": "Coffee, Beverages, Snacks",
        "Taco Bell": "Tacos, Burritos, Mexican Fast Food"
    };

    if (cuisines[name]) {
        document.getElementById('restaurant-cuisine').innerText = cuisines[name];
    } else {
        document.getElementById('restaurant-cuisine').innerText = "Fast Food, Delicious Meals, Beverages";
    }

    // Set logo dynamically
    if (logoSrc) {
        document.getElementById('logo-container').innerHTML = `<img src="${logoSrc}" alt="${name}" style="width: 100%; height: 100%; object-fit: contain; background: #fff; padding: 10px;">`;
    }
</script>
</body>
</html>
