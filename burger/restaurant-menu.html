    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-container {
            display: flex;
            padding: 120px 8%;
            gap: 40px;
        }
        .categories-sidebar {
            width: 250px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .category-item {
            padding: 15px 20px;
            color: #fff;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-item:hover, .category-item.active {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }
        .menu-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .food-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            transition: 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 480px;
        }
        .food-card:hover {
            transform: translateY(-5px);
            border-color: #ff9800;
            box-shadow: 0 10px 30px rgba(255,152,0,0.2);
        }
        .food-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            display: block;
        }
        .veg-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #fff;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .veg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: green;
        }
        .non-veg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: red;
        }
        .fav-heart {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        .fav-heart:hover {
            color: red;
        }
        .food-info h3 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .food-info p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
            min-height: 40px;
        }
        .price-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .current-price {
            color: #ff9800;
            font-size: 22px;
            font-weight: bold;
        }
        .original-price {
            color: #666;
            text-decoration: line-through;
            font-size: 16px;
        }
        .add-cart-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto;
        }
        .add-cart-btn:hover {
            background: #ff7b00;
        }
        @media(max-width: 992px) {
            .menu-container {
                flex-direction: column;
                padding: 100px 4% 50px 4%;
                gap: 25px;
            }
            .categories-sidebar {
                width: 100%;
                display: flex;
                overflow-x: auto;
                position: relative;
                top: 0;
                padding: 5px;
                gap: 12px;
                background: transparent;
                border: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .categories-sidebar::-webkit-scrollbar {
                display: none;
            }
            .categories-sidebar h2 {
                display: none;
            }
            .category-item {
                white-space: nowrap;
                margin-bottom: 0;
                font-size: 16px;
                padding: 10px 20px;
                flex: 0 0 auto;
            }
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
            .food-card {
                height: 460px;
                padding: 15px;
            }
            .food-image {
                height: 160px;
            }
            .food-info h3 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body style="background:#000;">

<div id="main">

    <!-- ================= NAVBAR ================= -->
    <nav style="background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);">
        <a href="index.html" class="logo">🍔 CraveGo</a>
        <div class="cntr-nav">
            <a href="index.html#home">Home</a>
            <a href="index.html#restaurants">Restaurants</a>
            <a href="order-history.html">Orders</a>
        </div>
        <div class="nav-right">
            <i class="ri-search-line" id="search-icon" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <i class="ri-user-line" id="profile-icon" onclick="window.location.href='profile.html'" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <div id="cart-icon-container" style="position:relative; cursor:pointer;" onclick="window.location.href='cart.html'">
                <i class="ri-shopping-cart-2-line" id="cart-icon" style="color:#fff; font-size:24px; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ff9800; color:#fff; font-size:12px; font-weight:bold; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
            </div>
            <a href="login.html" class="sign-btn">Sign In</a>
            <i class="ri-menu-fill" id="menu"></i>
        </div>
    </nav>

    <div class="menu-container">
        
        <!-- Sidebar -->
        <div class="categories-sidebar">
            <h2 style="color:#fff; margin-bottom:20px; font-family:'Product Sans B';">Categories</h2>
            <div class="category-item active" data-category="all"><i class="ri-restaurant-line"></i> All Items</div>
            <div class="category-item" data-category="burger">🍔 Burgers</div>
            <div class="category-item" data-category="pizza">🍕 Pizza</div>
            <div class="category-item" data-category="drinks">🥤 Drinks</div>
            <div class="category-item" data-category="desserts">🍰 Desserts</div>
            <div class="category-item" data-category="fries">🍟 Fries</div>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid" id="menu-grid">
            <!-- Food items will be dynamically injected here via JS -->
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    // Mock Menu Data
    const menuItems = [
        { id: 1, name: 'Double Cheese Burger', desc: 'Two juicy patties with melted cheese and fresh veggies.', price: 199, oldPrice: 249, category: 'burger', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500&auto=format&fit=crop&q=60', veg: false },
        { id: 2, name: 'Crispy Veg Burger', desc: 'Crunchy veg patty with creamy mayo and lettuce.', price: 129, oldPrice: 159, category: 'burger', img: 'https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=500&auto=format&fit=crop&q=60', veg: true },
        { id: 7, name: 'Spicy Chicken Burger', desc: 'Crispy fried chicken breast topped with spicy sauce.', price: 179, oldPrice: 219, category: 'burger', img: 'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=500&auto=format&fit=crop&q=60', veg: false },
        { id: 8, name: 'Mushroom Swiss Burger', desc: 'Swiss cheese and sautéed mushrooms atop a beef patty.', price: 229, oldPrice: 279, category: 'burger', img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500&auto=format&fit=crop&q=60', veg: false },
        
        { id: 3, name: 'Classic French Fries', desc: 'Golden crispy potato fries with peri-peri seasoning.', price: 99, oldPrice: 129, category: 'fries', img: 'https://images.unsplash.com/photo-1576107232684-1279f390859f?w=500&auto=format&fit=crop&q=60', veg: true },
        { id: 9, name: 'Cheese Loaded Fries', desc: 'Crispy fries smothered in rich cheese sauce.', price: 149, oldPrice: 189, category: 'fries', img: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500&auto=format&fit=crop&q=60', veg: true },
        
        { id: 4, name: 'Margherita Pizza', desc: 'Classic cheese and tomato pizza.', price: 299, oldPrice: 349, category: 'pizza', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500&auto=format&fit=crop&q=60', veg: true },
        { id: 10, name: 'Pepperoni Feast Pizza', desc: 'Double pepperoni with mozzarella and classic sauce.', price: 399, oldPrice: 499, category: 'pizza', img: 'https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?w=500&auto=format&fit=crop&q=60', veg: false },
        
        { id: 5, name: 'Coke Zero', desc: 'Refreshing zero sugar cola.', price: 60, oldPrice: 75, category: 'drinks', img: 'https://images.unsplash.com/photo-1554866585-cd94860890b7?w=500&auto=format&fit=crop&q=60', veg: true },
        { id: 11, name: 'Fresh Lime Soda', desc: 'Fizzy lemon water served chilled.', price: 70, oldPrice: 90, category: 'drinks', img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=500&auto=format&fit=crop&q=60', veg: true },
        
        { id: 6, name: 'Chocolate Lava Cake', desc: 'Warm chocolate cake with gooey center.', price: 149, oldPrice: 199, category: 'desserts', img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=500&auto=format&fit=crop&q=60', veg: true },
        { id: 12, name: 'Warm Apple Pie', desc: 'Classic apple pie with cinnamon glaze.', price: 159, oldPrice: 199, category: 'desserts', img: 'https://images.unsplash.com/photo-1507226983735-a838615193b0?w=500&auto=format&fit=crop&q=60', veg: true }
    ];

    const menuGrid = document.getElementById('menu-grid');
    const categoryItems = document.querySelectorAll('.category-item');

    function renderMenu(category = 'all') {
        const filteredItems = category === 'all' ? menuItems : menuItems.filter(item => item.category === category);
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        
        menuGrid.innerHTML = '';
        
        filteredItems.forEach(item => {
            const isFav = wishlist.some(fav => fav.id === item.id);
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <div class="veg-badge" style="border: 2px solid ${item.veg ? 'green' : 'red'};">
                    <div class="${item.veg ? 'veg-dot' : 'non-veg-dot'}"></div>
                </div>
                <i class="${isFav ? 'ri-heart-fill' : 'ri-heart-line'} fav-heart" style="color: ${isFav ? 'red' : '#fff'};" onclick="toggleWishlist(this, ${item.id})"></i>
                <img src="${item.img}" class="food-image" alt="${item.name}">
                <div class="food-info">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <div class="price-row">
                        <span class="current-price">₹${item.price}</span>
                        <span class="original-price">₹${item.oldPrice}</span>
                    </div>
                </div>
                <button class="add-cart-btn" onclick="addToCart(${item.id})">Add to Cart</button>
            `;
            menuGrid.appendChild(card);
        });

        // GSAP Animation for items appearing - Animating only Y offset with cleanup
        gsap.from(".food-card", {
            y: 50,
            duration: 0.5,
            stagger: 0.1,
            ease: "back.out(1.7)",
            clearProps: "y"
        });
    }

    // Initial render
    renderMenu();

    // Category Filter Logic
    categoryItems.forEach(item => {
        item.addEventListener('click', () => {
            document.querySelector('.category-item.active').classList.remove('active');
            item.classList.add('active');
            const cat = item.getAttribute('data-category');
            renderMenu(cat);
        });
    });

    // Add to Cart Function
    function addToCart(id) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const item = menuItems.find(i => i.id === id);
        
        const existingItem = cart.find(i => i.id === id);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ ...item, quantity: 1 });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        updateGlobalCartCount();
        
        // Show a brief animation on the button
        event.target.innerText = "Added!";
        event.target.style.background = "green";
        setTimeout(() => {
            event.target.innerText = "Add to Cart";
            event.target.style.background = "#ff9800";
        }, 1000);
    }

    // Toggle Wishlist Function
    function toggleWishlist(element, id) {
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const item = menuItems.find(i => i.id === id);
        const index = wishlist.findIndex(w => w.id === id);

        if (index > -1) {
            wishlist.splice(index, 1);
            element.className = 'ri-heart-line fav-heart';
            element.style.color = '#fff';
        } else {
            wishlist.push(item);
            element.className = 'ri-heart-fill fav-heart';
            element.style.color = 'red';
        }

        localStorage.setItem('wishlist', JSON.stringify(wishlist));
    }
</script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</body>
