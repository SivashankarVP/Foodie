<html lang="en">
<head>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">

    <meta property="twitter:title" content="Secure Payment - Foodie">

    <title>Secure Payment - Foodie</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-wrapper {
            padding: 120px 8%;
            color: #fff;
            max-width: 800px;
            margin: 0 auto;
        }
        .payment-title {
            font-size: 36px;
            font-family: 'Product Sans B';
            margin-bottom: 30px;
        }
        .payment-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
        }
        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .payment-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .payment-card:hover, .payment-card.active {
            border-color: #ff9800;
            background: rgba(255,152,0,0.05);
        }
        .payment-card-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .payment-card-left i {
            font-size: 28px;
            color: #ff9800;
        }
        .payment-card-left span {
            font-size: 18px;
            font-weight: 600;
        }
        .payment-detail-form {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 14px;
            color: #aaa;
        }
        .input-group input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
        }
        .pay-summary {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }
        .pay-btn {
            width: 100%;
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .pay-btn:hover {
            background: #ff7b00;
        }
        @media(max-width: 768px) {
            .payment-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
        @media(max-width: 600px) {
            .payment-wrapper {
                padding: 100px 4%;
            }
            .payment-title {
                font-size: 28px;
                margin-bottom: 20px;
            }
            .payment-card {
                padding: 15px;
            }
            .payment-card-left span {
                font-size: 15px;
            }
            .payment-card-left i {
                font-size: 24px;
            }
            .pay-summary {
                padding: 20px;
            }
        }
    </style>
</head>
<body style="background:#000;">

<div id="main">

    <!-- ================= NAVBAR ================= -->
    <nav style="background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);">
        <a href="index.html" class="logo">🍔 Foodie</a>
        <div class="cntr-nav">
            <a href="index.html#home">Home</a>
            <a href="index.html#restaurants">Restaurants</a>
            <a href="order-history.html">Orders</a>
        </div>
        <div class="nav-right">
            <i class="ri-search-line" id="search-icon" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <i class="ri-user-line" id="profile-icon" onclick="window.location.href='profile.html'" style="color:#fff; font-size:24px; cursor:pointer; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
            <div id="cart-icon-container" style="position:relative; cursor:pointer;" onclick="window.location.href='cart.html'">
                <i class="ri-shopping-cart-2-line" id="cart-icon" style="color:#fff; font-size:24px; transition:.3s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#fff'"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ff9800; color:#fff; font-size:12px; font-weight:bold; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
            </div>
            <a href="login.html" class="sign-btn">Sign In</a>
            <i class="ri-menu-fill" id="menu"></i>
        </div>
    </nav>

    <div class="payment-wrapper">
        <div class="payment-title">Select Payment Method</div>

        <div class="payment-container">
            <div class="payment-options">
                <!-- UPI Option -->
                <div class="payment-card active" onclick="selectPayment(this, 'upi-section')">
                    <div class="payment-card-left">
                        <i class="ri-qr-code-line"></i>
                        <span>UPI / Google Pay / PhonePe</span>
                    </div>
                    <i class="ri-checkbox-circle-fill" style="color:#ff9800;"></i>
                </div>
                <div id="upi-section" class="payment-detail-form" style="display:block;">
                    <div class="input-group">
                        <label for="vpa">Enter UPI ID (e.g. username@okhdfcbank)</label>
                        <input type="text" id="vpa" placeholder="pay@upi">
                    </div>
                </div>

                <!-- Card Option -->
                <div class="payment-card" onclick="selectPayment(this, 'card-section')">
                    <div class="payment-card-left">
                        <i class="ri-bank-card-2-line"></i>
                        <span>Credit / Debit Card</span>
                    </div>
                    <i class="ri-checkbox-blank-circle-line"></i>
                </div>
                <div id="card-section" class="payment-detail-form">
                    <div class="input-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="input-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY">
                        </div>
                        <div class="input-group">
                            <label>CVV</label>
                            <input type="password" placeholder="***">
                        </div>
                    </div>
                </div>

                <!-- Cash on Delivery -->
                <div class="payment-card" onclick="selectPayment(this, 'cod-section')">
                    <div class="payment-card-left">
                        <i class="ri-coins-line"></i>
                        <span>Cash on Delivery</span>
                    </div>
                    <i class="ri-checkbox-blank-circle-line"></i>
                </div>
                <div id="cod-section" class="payment-detail-form">
                    <p style="color:#aaa; font-size:14px;">Pay with Cash / UPI at the time of delivery.</p>
                </div>
            </div>

            <div class="pay-summary">
                <h3 style="margin-bottom:15px;">Amount to Pay</h3>
                <h2 id="final-amount" style="color:#ff9800; font-size:32px; font-family:'Product Sans B';">₹0</h2>
                
                <!-- Razorpay Script Integration Hook -->
                <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
                
                <button class="pay-btn" onclick="completePayment()">Pay & Place Order</button>
            </div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    function loadPaymentDetails() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        let subtotal = 0;
        cart.forEach(item => {
            subtotal += item.price * item.quantity;
        });

        const discountAmount = parseInt(localStorage.getItem('discountAmount')) || 0;
        const gst = Math.round(subtotal * 0.18);
        const delivery = 40;
        const total = subtotal + gst + delivery - discountAmount;

        document.getElementById('final-amount').innerText = `₹${Math.max(0, total)}`;
    }

    function selectPayment(card, sectionId) {
        document.querySelectorAll('.payment-card').forEach(c => {
            c.classList.remove('active');
            c.querySelector('i:last-child').className = 'ri-checkbox-blank-circle-line';
        });
        document.querySelectorAll('.payment-detail-form').forEach(form => form.style.display = 'none');

        card.classList.add('active');
        card.querySelector('i:last-child').className = 'ri-checkbox-circle-fill';
        document.getElementById(sectionId).style.display = 'block';
    }

    function completePayment() {
        // Save current cart items as a completed order in order history
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const orderHistory = JSON.parse(localStorage.getItem('order_history')) || [];
        
        let subtotal = 0;
        cart.forEach(item => {
            subtotal += item.price * item.quantity;
        });
        const discountAmount = parseInt(localStorage.getItem('discountAmount')) || 0;
        const gst = Math.round(subtotal * 0.18);
        const total = subtotal + gst + 40 - discountAmount;

        const newOrder = {
            orderNumber: 'FD' + Math.floor(100000 + Math.random() * 900000),
            date: new Date().toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' }),
            restaurant: "McDonald's",
            items: cart,
            price: Math.max(0, total),
            paymentMethod: document.querySelector('.payment-card.active span').innerText,
            status: 'Delivered', // For order history representation
            address: localStorage.getItem('delivery_address') || 'Home Address'
        };

        orderHistory.unshift(newOrder);
        localStorage.setItem('order_history', JSON.stringify(orderHistory));
        localStorage.setItem('last_order', JSON.stringify(newOrder));
        
        // Empty the cart
        localStorage.removeItem('cart');

        // Go to success page
        window.location.href = 'order-success.html';
    }

    loadPaymentDetails();
</script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="particles-init.js"></script>
</body>
</html>
